services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reports
      POSTGRES_PASSWORD: reports
      POSTGRES_DB: reports
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reports -d reports"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://reports:reports@postgres:5432/reports?schema=public
      REDIS_URL: redis://redis:6379
      FILES_DIR: /data/files
      PUBLIC_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    volumes:
      - files:/data/files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://reports:reports@postgres:5432/reports?schema=public
      REDIS_URL: redis://redis:6379
      FILES_DIR: /data/files
    volumes:
      - files:/data/files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  pgdata:
  files:

